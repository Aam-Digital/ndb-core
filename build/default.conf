server {
    listen       ${PORT};
    listen  [::]:${PORT};

    #charset koi8-r;
    #access_log  /var/log/nginx/host.access.log  main;

    # Bodies of all sizes are allowed
    client_max_body_size 0;

    root /usr/share/nginx/html;

    add_header Content-Security-Policy-Report-Only "${CSP}; report-uri ${CSP_REPORT_URI}?ngsw-bypass=true";
    # ?ngsw-bypass prevents angular serviceworker to intercept and break CSP reporting (https://github.com/angular/angular/issues/31477)

    # TODO: consider adding `trusted-types angular angular#unsafe-bypass; require-trusted-types-for 'script';` CSP in future
    add_header X-Frame-Options SAMEORIGIN; # only applies in older browsers, CSP frame-ancestors takes prevalence https://stackoverflow.com/a/40417609/1473411
    add_header X-Content-Type-Options nosniff;

    # Catch requests to the assets folder
    # These should not be forwarded to the index.html
    # This currently includes a fallback for previous requests including a locale
    location ~* /assets/(.+)$ {
        # $1 refers to everything after 'assets/'
        try_files $uri /assets/$1 =404;
    }

    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html =404;
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # The proxy path should be the same as in environment.DB_PROXY_PREFIX
    location ^~ /db {
        rewrite /db/(.*) /$1 break;
        proxy_pass ${COUCHDB_URL};
        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Ssl on;
    }

    # The proxy path should be the same as in environment.API_PROXY_PREFIX
    location ^~ /api {
        proxy_pass ${QUERY_URL};
        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Ssl on;
    }
    # @deprecated: use /api instead of /query
    location ^~ /query {
        rewrite /query/(.*) /$1 break;
        proxy_pass ${QUERY_URL};
        proxy_redirect off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Ssl on;
    }

    # The proxy path should be the same as in GeoService.remoteUrl
    location ^~ /nominatim {
        # Resolve the upstream at request time with IPv6 disabled: the public
        # Nominatim host is dual-stack (Fastly), but containers without an IPv6
        # route get "Network unreachable" on the AAAA address, which nginx then
        # reports as a 502. The resolver IP is derived from /etc/resolv.conf at startup.
        resolver ${RESOLVER} ipv6=off valid=300s;
        set $nominatim_upstream ${NOMINATIM_URL};
        set $nominatim_host "";
        if ($nominatim_upstream ~* ^(?:https?://)?([^/:]+)) {
            set $nominatim_host $1;
        }
        rewrite /nominatim/(.*) /$1 break;
        proxy_pass $nominatim_upstream;
        proxy_redirect off;
        proxy_buffering off;
        proxy_ssl_server_name on;
        proxy_ssl_name $nominatim_host;
        # Do not verify the upstream certificate. The connection is still
        # TLS-encrypted, we just don't authenticate the upstream cert chain.
        # Nominatim's public host (Fastly) moved to a brand-new Let's Encrypt
        # root hierarchy (ISRG Root YR) that is not yet in any CA bundle, so
        # `proxy_ssl_verify on` fails with "unable to get local issuer
        # certificate" whenever the edge serves the chain without the X1
        # cross-sign. Verification is low-value here: only public geocoding
        # queries are sent, no credentials, and the results are not security
        # critical. Off is robust to future Let's Encrypt root rotations.
        proxy_ssl_verify off;
        proxy_set_header Host $nominatim_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Ssl on;
    }
}

