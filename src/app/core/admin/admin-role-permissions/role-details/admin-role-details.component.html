<div class="flex-row flex-wrap">
  <div class="flex-grow">
    <app-view-title i18n>Role Permissions</app-view-title>
  </div>

  <div class="flex-row gap-small align-center">
    <button mat-stroked-button color="accent" (click)="editJson()">
      <fa-icon icon="code" class="standard-icon-with-text"></fa-icon>
      <span i18n>JSON</span>
    </button>

    @if (editing()) {
      <button mat-raised-button color="accent" (click)="save()" i18n>
        Save
      </button>
      <button mat-stroked-button (click)="cancel()" i18n>Cancel</button>
    } @else {
      <button mat-raised-button color="accent" (click)="startEditing()">
        <fa-icon icon="pen" class="standard-icon-with-text"></fa-icon>
        <span i18n>Edit</span>
      </button>
    }
  </div>
</div>

<div class="flex-row flex-wrap gap-regular margin-bottom-regular">
  <mat-form-field>
    <mat-label i18n>Role name</mat-label>
    <input matInput [value]="roleName()" readonly />
  </mat-form-field>

  <mat-form-field class="flex-grow">
    <mat-label i18n>Description</mat-label>
    <input matInput [value]="role()?.description ?? ''" readonly />
  </mat-form-field>
</div>

@if (model()) {
  <app-permission-matrix
    [model]="model()"
    [editable]="editing()"
    [roleName]="roleName()"
    (modelChange)="onModelChange($event)"
  ></app-permission-matrix>
} @else {
  <p class="text-secondary" i18n>
    No permissions defined for this role yet. Users with this role only have the
    permissions of the "default" role.
  </p>
}
