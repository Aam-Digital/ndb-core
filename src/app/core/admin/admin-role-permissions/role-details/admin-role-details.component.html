<div class="flex-row flex-wrap">
  <div class="flex-grow">
    <app-view-title i18n>Role Permissions</app-view-title>
  </div>

  <button mat-stroked-button color="accent" (click)="editJson()">
    <fa-icon icon="code" class="standard-icon-with-text"></fa-icon>
    <span i18n>JSON</span>
  </button>
</div>

<div class="flex-row flex-wrap gap-regular margin-bottom-regular">
  <mat-form-field>
    <mat-label i18n>Role name</mat-label>
    <input matInput [value]="roleName()" readonly />
  </mat-form-field>

  <mat-form-field class="flex-grow">
    <mat-label i18n>Description</mat-label>
    <input matInput [value]="role()?.description ?? ''" readonly />
  </mat-form-field>
</div>

@if (model()) {
  <app-permission-matrix [model]="model()"></app-permission-matrix>
} @else {
  <p class="text-secondary" i18n>
    No permissions defined for this role yet. Users with this role only have the
    permissions of the "default" role. Use the JSON editor to add rules for now.
  </p>
}
