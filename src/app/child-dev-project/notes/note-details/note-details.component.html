@if (isLoading || !tmpEntity()) {
  <div>
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  </div>
} @else {
  <app-view-title>
    {{ tmpEntity()!.date | customDate: "shortDate" }}:
    {{ tmpEntity()!.subject }}
  </app-view-title>

  <div class="flex-column gap-regular">
    <app-entity-archived-info [entity]="entity()"></app-entity-archived-info>

    <app-entity-form
      [fieldGroups]="topFieldGroups"
      [entity]="entity()"
      [form]="$any(form)"
    >
    </app-entity-form>

    <!-- Primary information of Note -->
    <app-entity-form
      [fieldGroups]="middleFieldGroups"
      [entity]="entity()"
      [form]="$any(form)"
      [fullWidth]="true"
    ></app-entity-form>

    <app-entity-form
      [fieldGroups]="bottomFieldGroups"
      [entity]="entity()"
      [form]="$any(form)"
      style="margin-top: 10px"
    ></app-entity-form>
  </div>

  <app-view-actions>
    <app-dialog-buttons [form]="$any(form)" [entity]="entity()">
      <button mat-menu-item (click)="openExportDialog()">
        <fa-icon
          class="color-accent standard-icon-with-text"
          aria-label="download csv"
          icon="download"
          angulartics2On="click"
          angularticsCategory="Note"
          angularticsAction="single_note_csv_export"
        ></fa-icon>
        <span i18n="Download note details as CSV">Download details</span>
      </button>
    </app-dialog-buttons>
  </app-view-actions>
}
