<mat-card
  appBorderHighlight
  [borderClass]="'border-' + warningLevel"
  class="main-card"
>
  <mat-card-header>
    <mat-card-title>{{ event?.subject }}</mat-card-title>
  </mat-card-header>
  <mat-card-content class="text-secondary">
    <fa-icon icon="child"></fa-icon>
    {{ event.childrenAttendance?.length ?? 0 }}
    <span i18n>participants</span>

    @if (!recurring) {
      <span class="sep">/</span>
      <fa-icon icon="calendar"></fa-icon>
      {{ event.date | customDate: "shortDate" }}
    }
    <span class="sep">/</span>{{ event.category?.label }}
  </mat-card-content>
</mat-card>
