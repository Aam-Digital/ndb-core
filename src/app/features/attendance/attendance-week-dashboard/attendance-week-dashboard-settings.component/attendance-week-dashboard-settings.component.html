<div style="padding: 16px">
  <mat-form-field appearance="fill" class="full-width">
    <mat-label i18n>Period Label</mat-label>
    <input
      matInput
      [ngModel]="periodLabel()"
      (ngModelChange)="periodLabel.set($event)"
    />
  </mat-form-field>
  <mat-form-field appearance="fill" class="full-width">
    <mat-label i18n>Days Offset</mat-label>
    <input
      matInput
      type="number"
      [ngModel]="daysOffset()"
      (ngModelChange)="daysOffset.set($event)"
    />
  </mat-form-field>
  <mat-form-field appearance="fill" class="full-width">
    <mat-label i18n>Attendance Status Type</mat-label>
    <input
      matInput
      [ngModel]="attendanceStatusType()"
      (ngModelChange)="attendanceStatusType.set($event)"
      placeholder="(optional, e.g. LATE)"
      i18n-placeholder
    />
  </mat-form-field>
</div>
