<div class="map-frame" [style.height]="height()">
  <div id="map" #map>
    <div class="action-elements">
      @if (expandable()) {
        <button mat-mini-fab (click)="openMapInPopup()">
          <app-fa-dynamic-icon
            icon="expand"
            style="color: black"
          ></app-fa-dynamic-icon>
        </button>
      }
      @if (showPropertySelection()) {
        <button mat-mini-fab (click)="openMapPropertiesPopup()">
          <app-fa-dynamic-icon
            icon="location-dot"
            style="color: black"
          ></app-fa-dynamic-icon>
        </button>
      }
    </div>
  </div>
</div>
