name: Semantic Release
on:
  workflow_dispatch

permissions:
  contents: write  # needed for semantic-release to create tags/releases

jobs:
  pre-releases-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Delete previous pre-release releases and tags
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Delete all releases with "-master" in the tag (pre-releases) and their tags
          gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 --json tagName --jq '.[].tagName' \
            | grep '\-master' \
            | while read -r tag; do
                echo "Deleting release and tag: $tag"
                gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
              done

          # Delete any remaining orphaned pre-release git tags
          git fetch --tags
          git tag -l '*-master*' | while read -r tag; do
            echo "Deleting orphaned tag: $tag"
            git push --delete origin "$tag" || true
          done

  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up node
        uses: actions/setup-node@v4

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          branches: |
            [{"name": "master", "prerelease": false}]
          extra_plugins: |
            semantic-release-replace-plugin@1.2.6
            @semantic-release/git
            @semantic-release/github
            semantic-release-slack-bot

  # Build and Docker image are handled by tag-published.yml,
  # which is triggered automatically when semantic-release pushes a new tag.
