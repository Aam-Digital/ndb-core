name: Label Triggered Review
# Runs Argos visual review when 'Ready for AI Review' label is applied.
# CodeRabbit is triggered separately via .coderabbit.yaml (same label).

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  id-token: write

jobs:
  argos-visual-review:
    if: github.event.label.name == 'Ready for Review'
    uses: ./.github/workflows/_qa.yaml
    secrets: inherit
    with:
      upload-e2e-screenshots: true
      e2e-only: true
      is-fork: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
